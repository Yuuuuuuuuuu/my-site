name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "."
          REMOTE_HOST: "43.134.232.53"
          REMOTE_PORT: "8898"
          REMOTE_USER: "root"
          TARGET: "/var/www/my-site"

      - name: Reload Nginx
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          REMOTE_HOST: "43.134.232.53"
          REMOTE_PORT: "8898"
          REMOTE_USER: "root"
          REMOTE_CMD: "nginx -s reload"

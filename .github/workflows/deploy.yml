name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore & Build
        run: |
          cd backend/GoPractice.Api
          dotnet restore
          dotnet publish -c Release -o ../../publish

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/"
          target: "/var/www/go-practice/backend"
          strip_components: 1

      - name: Setup & Restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            SERVICE_FILE=/etc/systemd/system/go-practice.service
            if [ ! -f "$SERVICE_FILE" ]; then
              cat > "$SERVICE_FILE" << EOF
            [Unit]
            Description=Go Practice Backend API
            After=network.target mysql.service

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/var/www/go-practice/backend
            ExecStart=/usr/bin/dotnet /var/www/go-practice/backend/GoPractice.Api.dll
            Restart=always
            RestartSec=5
            Environment=ASPNETCORE_URLS=http://0.0.0.0:8080
            Environment=ASPNETCORE_ENVIRONMENT=Production
            StandardOutput=append:/var/log/go-practice.log
            StandardError=append:/var/log/go-practice.log

            [Install]
            WantedBy=multi-user.target
            EOF
              systemctl daemon-reload
              systemctl enable go-practice
            fi
            systemctl restart go-practice

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist/"
          target: "/var/www/go-practice/frontend"
          strip_components: 2

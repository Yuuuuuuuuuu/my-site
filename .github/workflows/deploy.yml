name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync openssh-client

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 8898 -H 43.134.232.53 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH
        run: ssh -p 8898 root@43.134.232.53 "echo SSH OK"

      - name: Deploy
        run: rsync -avz --delete -e "ssh -p 8898" ./ root@43.134.232.53:/var/www/my-site/

      - name: Reload Nginx
        run: ssh -p 8898 root@43.134.232.53 "nginx -s reload"

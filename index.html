<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的站点</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 100px auto;
            padding: 20px;
            text-align: center;
            background: #f5f5f5;
            color: #333;
        }
        h1 { color: #2563eb; }
        .info {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status {
            display: inline-block;
            padding: 6px 16px;
            background: #22c55e;
            color: white;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>🚀 CI/CD 部署成功！</h1>
        <p class="status">✅ 自动部署运行中</p>
        <p>这个页面是通过 GitHub Actions 自动部署的。</p>
        <p>你本地改代码 → git push → 自动上线</p>
        <hr>
        <p><small>部署时间: <span id="time"></span></small></p>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
